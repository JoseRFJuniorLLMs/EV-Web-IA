name: Build & Deploy EV-Web to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GCP_PROJECT: malaria-487614
  GCP_ZONE: africa-south1-a
  VM_NAME: malaria-vm

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: http://34.35.36.178/ev-web-ia/
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy to VM
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --project=${{ env.GCP_PROJECT }} \
            --command="
              set -e

              # Login to GHCR
              echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin

              # Pull latest image
              docker pull ghcr.io/${{ github.repository_owner }}/ev-web-ia:latest

              # Stop old container
              docker stop ev-web-ia 2>/dev/null || true
              docker rm ev-web-ia 2>/dev/null || true

              # Start new container (port 3080 -> nginx inside)
              docker run -d \
                --name ev-web-ia \
                --restart unless-stopped \
                --network host \
                -p 3080:3080 \
                ghcr.io/${{ github.repository_owner }}/ev-web-ia:latest

              # Add nginx location block for /ev-web-ia/ if not present
              if ! grep -q 'ev-web-ia' /etc/nginx/sites-enabled/default 2>/dev/null && \
                 ! grep -q 'ev-web-ia' /etc/nginx/conf.d/*.conf 2>/dev/null; then

                sudo tee /etc/nginx/conf.d/ev-web-ia.conf > /dev/null <<'NGINX'
              location /ev-web-ia/ {
                  proxy_pass http://localhost:3080/;
                  proxy_set_header Host \\\$host;
                  proxy_set_header X-Real-IP \\\$remote_addr;
                  proxy_set_header X-Forwarded-For \\\$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \\\$scheme;
              }

              location /ev-web-ia/ws/ {
                  proxy_pass http://localhost:3080/ws/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \\\$http_upgrade;
                  proxy_set_header Connection \"upgrade\";
                  proxy_set_header Host \\\$host;
              }
          NGINX

                sudo nginx -t && sudo nginx -s reload || true
              fi

              # Cleanup old images
              docker image prune -f

              echo 'EV-Web deploy complete!'
            "

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 10
          for i in $(seq 1 6); do
            if gcloud compute ssh ${{ env.VM_NAME }} \
              --zone=${{ env.GCP_ZONE }} \
              --project=${{ env.GCP_PROJECT }} \
              --command="curl -sf http://localhost:3080/" 2>/dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/6 - waiting..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Show deploy info
        if: always()
        run: |
          echo "## EV-Web Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **VM:** ${{ env.VM_NAME }} (34.35.36.178)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** http://34.35.36.178/ev-web-ia/" >> $GITHUB_STEP_SUMMARY
          echo "- **Container:** ev-web-ia (port 3080)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** http://localhost:8082 (sigec-api)" >> $GITHUB_STEP_SUMMARY
