name: Deploy EV-Web to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ev-web:latest .

      - name: Stop old container
        run: docker rm -f ev-web 2>/dev/null || true

      - name: Run new container
        run: |
          docker run -d \
            --name ev-web \
            --network host \
            --restart unless-stopped \
            ev-web:latest
